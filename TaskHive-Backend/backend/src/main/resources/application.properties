spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskhive?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://0.0.0.0:*,http://[::1]:*}
app.seed.admin-email=${SEED_ADMIN_EMAIL:admin@taskhive.local}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:admin123}
app.cookie.name=${COOKIE_NAME:taskhive_session}
app.cookie.max-age-seconds=${COOKIE_MAX_AGE:86400}
app.cookie.secure=${COOKIE_SECURE:false}
